<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sermi — Thời trang sơ mi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .logo {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e8d5b7, #f5e6cc, #c9a96e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: #a0a0a0;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .divider {
      width: 60px;
      height: 1px;
      background: #c9a96e;
      margin: 0 auto 2rem;
    }
    .message {
      font-size: 1.1rem;
      color: #d0d0d0;
      line-height: 1.8;
    }
    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      border: 1px solid #c9a96e;
      color: #c9a96e;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">The Sermi</h1>
    <p class="tagline">Fashion & Lifestyle</p>
    <div class="divider"></div>
    <p class="message">
      Chúng tôi đang chuẩn bị mang đến trải nghiệm mua sắm tốt nhất.<br>
      Hẹn gặp lại bạn sớm!
    </p>
    <span class="badge">Coming Soon</span>
  </div>
</body>
</html>
